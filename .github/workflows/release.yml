name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Verify tag matches Cargo.toml versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SYS_V=$(cargo metadata --no-deps --format-version=1 \
              | jq -r '.packages[] | select(.name == "open1722-sys") | .version')
          WRAPPER_V=$(cargo metadata --no-deps --format-version=1 \
              | jq -r '.packages[] | select(.name == "open1722") | .version')
          if [ "$TAG" != "$SYS_V" ] || [ "$TAG" != "$WRAPPER_V" ]; then
            echo "Tag $TAG does not match crate versions (sys=$SYS_V, wrapper=$WRAPPER_V)"
            exit 1
          fi
      - name: Test
        run: cargo test --workspace --all-targets
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish open1722-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p open1722-sys
      - name: Wait for crates.io to index open1722-sys
        run: sleep 30
      - name: Publish open1722
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p open1722
